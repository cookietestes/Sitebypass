<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass - Mostra Link Final Direto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #111827, #1f2937); color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-3xl bg-gray-800/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-4xl font-bold text-center text-emerald-400 mb-8">Bypass Link Final</h1>
        <p class="text-center text-lg mb-6">Cole o link protegido (wileywales, eusoupet, linkvertise...) → clica → mostro o link final (Mediafire, etc.)</p>

        <input id="urlInput" type="url" placeholder="https://wileywales.com/10262-2/ ou qualquer encurtador"
               class="w-full p-5 rounded-xl bg-gray-900 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 mb-6 text-lg">

        <button onclick="extrairLinkFinal()"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xl py-5 rounded-xl transition active:scale-95">
            MOSTRAR LINK FINAL AGORA
        </button>

        <div id="resultado" class="mt-10 p-6 bg-gray-900/70 rounded-xl border border-gray-600 min-h-[150px] text-center">
            <p class="text-gray-400">O link final vai aparecer aqui (Mediafire, Mega, Drive...)</p>
        </div>
    </div>

    <script>
        async function extrairLinkFinal() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            const resultado = document.getElementById('resultado');

            if (!url) {
                resultado.innerHTML = '<p class="text-yellow-400 text-xl">Cole um link primeiro!</p>';
                return;
            }

            resultado.innerHTML = '<p class="text-emerald-400 text-xl animate-pulse">Buscando link final...</p>';

            try {
                // Abre a página original em nova aba (pra você ver/clicar se precisar)
                window.open(url, '_blank');

                // Usa proxy grátis pra pegar o HTML (evita CORS)
                const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                const response = await fetch(proxy);
                if (!response.ok) throw new Error('Não consegui carregar a página');

                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                let linkFinal = null;
                const possiveis = [];

                // Procura TODOS os <a href> e filtra os mais prováveis
                doc.querySelectorAll('a[href]').forEach(a => {
                    const href = a.href;
                    const texto = (a.textContent || a.innerText || '').toLowerCase().trim();

                    if (href && href.startsWith('http') && 
                        !href.includes('wileywales.com') && 
                        !href.includes('eusoupet.com') && 
                        !href.includes(window.location.hostname)) {

                        // Prioridade alta: hosts de download comuns
                        if (href.includes('mediafire.com') || 
                            href.includes('mega.nz') || 
                            href.includes('drive.google.com') || 
                            href.includes('dropbox.com') || 
                            href.includes('1fichier.com') ||
                            texto.includes('download') || texto.includes('mediafire') || texto.includes('mega') ||
                            texto.includes('clique aqui') || texto.includes('baixar') || texto.includes('continuar')) {
                            linkFinal = href; // Achou um forte candidato → para aqui
                            return;
                        }

                        // Senão, guarda como possível
                        possiveis.push({ href, texto });
                    }
                });

                // Se não achou prioridade alta, pega o primeiro externo razoável
                if (!linkFinal && possiveis.length > 0) {
                    linkFinal = possiveis[0].href;
                }

                if (linkFinal) {
                    resultado.innerHTML = `
                        <p class="text-2xl font-bold text-emerald-400 mb-4">✅ LINK FINAL ENCONTRADO!</p>
                        <a href="${linkFinal}" target="_blank" class="block bg-gray-800 p-5 rounded-xl text-emerald-300 hover:text-emerald-200 break-all font-mono border border-emerald-600/50">
                            ${linkFinal}
                        </a>
                        <p class="mt-4 text-gray-300">Clique acima pra ir direto (ou use a aba que abri).</p>
                    `;
                } else {
                    resultado.innerHTML = `
                        <p class="text-2xl font-bold text-yellow-400 mb-4">Não encontrei link final automático 😕</p>
                        <p class="text-lg">A página não mostra o link (provavelmente precisa clicar em anúncio ou ver vídeo primeiro).</p>
                        <p class="mt-3 text-gray-400">Já abri a página em outra aba → procure por "Mediafire", "Download" ou botão verde lá.</p>
                    `;
                }

            } catch (err) {
                resultado.innerHTML = `
                    <p class="text-2xl font-bold text-red-400 mb-4">Erro ao buscar</p>
                    <p class="text-lg">Já abri o link em outra aba. Tente clicar manualmente no anúncio/vídeo.</p>
                    <p class="text-sm mt-3 text-gray-500">Detalhe: ${err.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
